bio: |
  I am a clean fuels researcher working at the intersection of process modelling, circular carbon e-fuels, life cycle assessment, techno-economic analysis, and combustion. My research develops integrated biomass-to-e-methanol and CO₂-to-fuel pathways using Aspen Plus, GREET/Sphera-based LCA, TEA, Monte Carlo uncertainty analysis, and engine-based fuel evaluation.

  My broader goal is to support sustainable transport fuel strategies by connecting process design, environmental performance, cost analysis, and real-world fuel deployment.

