bio: |
  I am a researcher working at the intersection of clean fuels, circular carbon e-fuels, process modelling, life cycle assessment, techno-economic analysis, and combustion. My work focuses on developing integrated biomass-to-e-methanol and CO₂-to-fuel pathways using Aspen Plus, LCA, TEA, and uncertainty analysis to support sustainable transport fuel strategies.

